services:
  app:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3000
      BASE_URL: http://localhost:3000
      STORE_DRIVER: postgres
      POSTGRES_WRITE_MODE: row
      DATABASE_URL: postgres://mmo:mmo_password@postgres:5432/mmo_shop
      DATABASE_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: replace-with-long-random-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me-now
      PAYMENT_PROVIDER: sepay
      SEPAY_ACCOUNT_NUMBER: ""
      SEPAY_BANK_CODE: ""
      SEPAY_WEBHOOK_AUTH: hmac
      SEPAY_WEBHOOK_SECRET: replace-with-sepay-secret
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mmo
      POSTGRES_PASSWORD: mmo_password
      POSTGRES_DB: mmo_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmo -d mmo_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
